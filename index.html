<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nice — Film Ticket</title>
<style>
:root {
  --bg: #0a0a0c;
  --ticket-bg: #1a1a1f;
  --ticket-stub: #141418;
  --text: #e0ddd5;
  --text-dim: #8a857c;
  --text-bright: #f5f0e6;
  --accent: #d4a853;
  --accent-dim: #8b6914;
  --red: #c0392b;
  --divider: rgba(212,168,83,0.18);
  --perf: rgba(255,255,255,0.06);
  --progress-bg: rgba(255,255,255,0.06);
  --progress-fill: #d4a853;
  --font-ticket: 'SF Mono','Menlo','Monaco','Courier New',monospace;
  --font-ui: -apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  min-height:100vh; min-height:100dvh;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg);
  background-image: radial-gradient(ellipse at 50% 20%, rgba(212,168,83,0.06) 0%, transparent 70%);
  font-family:var(--font-ui);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  padding:12px;
}
/* Language toggle */
.lang-toggle {
  position:fixed; top:16px; right:16px; z-index:10;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  color:var(--text-dim); border-radius:6px; padding:4px 10px;
  font-size:12px; cursor:pointer; font-family:var(--font-ui);
  transition:all .2s;
}
.lang-toggle:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }

/* ── Ticket Container ── */
.ticket-wrapper {
  perspective:800px; width:100%; max-width:520px;
}
.ticket {
  position:relative;
  background:var(--ticket-bg);
  border-radius:2px;
  display:flex;
  min-height:340px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03);
  overflow:hidden;
  transition: transform .35s cubic-bezier(.25,.1,.25,1),
              box-shadow .35s cubic-bezier(.25,.1,.25,1);
  will-change:transform;
  contain:layout style;
}
.ticket:hover {
  transform:translateY(-2px);
  box-shadow: 0 28px 90px rgba(0,0,0,0.55), 0 6px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}

/* ── Left Stub ── */
.stub {
  width:110px; min-width:110px;
  background:var(--ticket-stub);
  display:flex; flex-direction:column; align-items:center;
  padding:24px 10px 20px;
  border-right:1px dashed var(--perf);
  position:relative;
  gap:8px;
}
.stub-label {
  font-family:var(--font-ticket); font-size:9px; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:2px;
  opacity:0.6;
}
.stub-avatar {
  font-family:var(--font-ticket); font-size:7px; line-height:1.2;
  color:var(--accent); white-space:pre; text-align:center;
  user-select:none; flex:1; display:flex; align-items:center;
  justify-content:center; min-height:80px;
}
.stub-initials {
  font-family:var(--font-ticket); font-size:16px; font-weight:700;
  color:var(--accent); letter-spacing:4px; margin-top:auto;
}
.stub-save {
  font-family:var(--font-ticket); font-size:8px; color:var(--text-dim);
  cursor:pointer; padding:4px 8px; border:1px solid rgba(255,255,255,0.08);
  border-radius:2px; transition:all .2s; text-transform:uppercase;
  letter-spacing:1px; background:transparent;
}
.stub-save:hover {
  color:var(--accent); border-color:var(--accent-dim);
}

/* ── Right Main Body ── */
.body {
  flex:1; display:flex; flex-direction:column; padding:24px 28px 0;
  min-width:0;
}
/* Top: cinema + title */
.body-header { margin-bottom:10px; }
.cinema {
  font-family:var(--font-ticket); font-size:10px; color:var(--text-dim);
  letter-spacing:3px; text-transform:uppercase; margin-bottom:6px;
}
.film-title {
  font-family:var(--font-ticket); font-size:26px; font-weight:700;
  color:var(--text-bright); letter-spacing:-1px; line-height:1.1;
  text-transform:uppercase;
}
.film-subtitle {
  font-family:var(--font-ticket); font-size:10px; color:var(--accent);
  letter-spacing:3px; text-transform:uppercase; margin-top:2px;
}

/* Meta row */
.meta {
  display:flex; gap:20px; margin-bottom:6px;
  font-family:var(--font-ticket);
}
.meta-item { display:flex; flex-direction:column; gap:1px; }
.meta-label { font-size:7px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.meta-value { font-size:10px; color:var(--text); letter-spacing:0.5px; }

/* Seat + admit */
.ticket-footer-row {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:0;
}
.seat {
  font-family:var(--font-ticket); font-size:9px; color:var(--text-dim);
  letter-spacing:1px;
}
.admit {
  font-family:var(--font-ticket); font-size:10px; color:var(--accent);
  text-transform:uppercase; letter-spacing:2px; font-weight:700;
}

/* ── Perforation / Tear line ── */
.tear-line {
  display:flex; align-items:center; gap:6px; margin:10px 0 8px;
  color:var(--text-dim); font-family:var(--font-ticket); font-size:8px;
  letter-spacing:1px; opacity:.5;
}
.tear-line::before,.tear-line::after {
  content:''; flex:1; height:0;
  border-top:1px dashed rgba(255,255,255,0.08);
}

/* ── Slogan ── */
.slogan {
  font-family:var(--font-ui); font-size:12px; color:var(--text-dim);
  font-style:italic; text-align:center; line-height:1.5;
  margin-bottom:6px; opacity:.7;
}

/* ── Countdown ── */
.countdown-row {
  display:flex; align-items:center; gap:10px;
  margin-bottom:6px; padding:8px 12px;
  background:rgba(255,255,255,0.02); border-radius:4px;
}
.countdown-label {
  font-family:var(--font-ticket); font-size:8px; color:var(--text-dim);
  text-transform:uppercase; letter-spacing:1px; white-space:nowrap;
}
.countdown-value {
  font-family:var(--font-ticket); font-size:22px; font-weight:700;
  color:var(--text-bright); letter-spacing:1px;
  transition:color .3s;
}
.countdown-value.urgent { color:var(--red); animation:pulse .6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Progress bars ── */
.progress-group { display:flex; flex-direction:column; gap:4px; margin-bottom:4px; }
.progress-row {
  display:flex; align-items:center; gap:8px;
}
.progress-label {
  font-family:var(--font-ticket); font-size:8px; color:var(--text-dim);
  width:55px; text-align:right; text-transform:uppercase; letter-spacing:1px;
  white-space:nowrap;
}
.progress-bar {
  flex:1; height:3px; background:var(--progress-bg);
  border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%; background:var(--progress-fill);
  border-radius:2px; transition:width .5s ease;
}
.progress-pct {
  font-family:var(--font-ticket); font-size:8px; color:var(--text-dim);
  width:36px; text-align:right;
}

/* ── Social links ── */
.social-row {
  display:flex; justify-content:center; gap:18px;
  padding:10px 0 14px; border-top:1px solid rgba(255,255,255,0.04);
}
.social-row a {
  display:inline-flex; align-items:center; gap:4px;
  color:var(--text-dim); text-decoration:none;
  font-family:var(--font-ticket); font-size:9px; letter-spacing:1px;
  text-transform:uppercase; transition:color .2s;
}
.social-row a:hover { color:var(--accent); }
.social-row svg { width:13px; height:13px; }

/* ── Animations ── */
@keyframes tearOut {
  0% { transform:translateX(0); opacity:1; }
  50% { transform:translateX(-20px); opacity:.5; }
  100% { transform:translateX(-120px); opacity:0; }
}
@keyframes tearIn {
  0% { transform:translateX(30px); opacity:0; }
  100% { transform:translateX(0); opacity:1; }
}
.tearing .ticket { animation:tearOut .5s ease-in forwards; }
.ticket.fresh { animation:tearIn .5s ease-out; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--ticket-bg); color:var(--accent);
  padding:8px 20px; border-radius:4px; font-family:var(--font-ticket);
  font-size:11px; letter-spacing:1px; z-index:20;
  border:1px solid rgba(212,168,83,0.2);
  opacity:0; transition:opacity .3s;
  pointer-events:none;
}
.toast.show { opacity:1; }

@media (max-width:500px) {
  .ticket { flex-direction:column; }
  .stub {
    width:100%; min-width:0; flex-direction:row; padding:12px 16px;
    border-right:none; border-bottom:1px dashed var(--perf); gap:12px;
  }
  .stub-avatar { min-height:0; font-size:6px; }
  .stub-initials { margin-top:0; }
  .stub-label { display:none; }
  .body { padding:16px 18px 0; }
  .film-title { font-size:22px; }
  .meta { gap:12px; }
  .meta-value { font-size:9px; }
  .countdown-value { font-size:18px; }
}
</style>
</head>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════
   i18n
   ═══════════════════════════════════════════ */
var lang = localStorage.getItem('lang') || 'zh';
var i18n = {
  zh: { stub:'存根', save:'保存票根', date:'日期', showtime:'场次', price:'票价',
        countdown:'距离开机剩余', today:'今日进度', year:'年度进度',
        slogan:'人生如电影。走到摄影机后面去。',
        saved:'票根已保存 ✓', cinema:'LOCALHOST' },
  en: { stub:'STUB', save:'SAVE TICKET', date:'DATE', showtime:'SHOW', price:'PRICE',
        countdown:'Until roll', today:'TODAY', year:'YEAR',
        slogan:'Life unfolds like a film. Step behind the camera.',
        saved:'Ticket saved  ✓', cinema:'LOCALHOST' }
};

function t(key) { return i18n[lang][key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.getElementById('slogan').textContent = t('slogan');
  document.getElementById('langToggle').textContent = lang === 'zh' ? 'EN' : '中';
  document.title = lang === 'zh' ? 'nice — 电影票' : 'nice — Film Ticket';
}

document.getElementById('langToggle').addEventListener('click', function() {
  lang = lang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', lang);
  applyI18n();
});

/* ═══════════════════════════════════════════
   Session Engine — 90min sessions from midnight
   ═══════════════════════════════════════════ */
var SESSIONS = [
  {name:'MIDNIGHT COMPILE', sub:'深夜编译', ascii:'moon'},
  {name:'DREAM DEBUG', sub:'调试梦境', ascii:'wave'},
  {name:'SILENT DEPLOY', sub:'静默部署', ascii:'circuit'},
  {name:'DAWN PATCH', sub:'黎明补丁', ascii:'constellation'},
  {name:'MORNING ITER', sub:'清晨迭代', ascii:'geo'},
  {name:'BREAKFAST ARCH', sub:'架构早餐', ascii:'blueprint'},
  {name:'FULL STACK', sub:'全栈日场', ascii:'diamond'},
  {name:'NOON REFACTOR', sub:'重构午时', ascii:'spiral'},
  {name:'LUNCH BREAK', sub:'午间休场', ascii:'face'},
  {name:'AFTERNOON BUILD', sub:'午后构建', ascii:'structure'},
  {name:'SUNSET COMMIT', sub:'日落提交', ascii:'waves'},
  {name:'EVENING REVIEW', sub:'黄昏审查', ascii:'pcb'},
  {name:'GOLDEN HOUR', sub:'黄金时段', ascii:'starfield'},
  {name:'NIGHT SHIFT', sub:'夜间轮值', ascii:'fractal'},
  {name:'LATE NIGHT OPS', sub:'深夜运维', ascii:'terminal'},
  {name:'LAST COMPILE', sub:'末次编译', ascii:'symbol'}
];

function getSession(now) {
  // now: Date or timestamp
  if (!(now instanceof Date)) now = new Date(now);
  var midnight = new Date(now);
  midnight.setHours(0,0,0,0);
  var minsSinceMidnight = (now - midnight) / 60000;
  var idx = Math.min(Math.floor(minsSinceMidnight / 90), 15);
  var start = new Date(midnight.getTime() + idx * 90 * 60000);
  var end   = new Date(start.getTime() + 90 * 60000);
  return {
    index: idx,
    name: SESSIONS[idx].name,
    sub: SESSIONS[idx].sub,
    ascii: SESSIONS[idx].ascii,
    start: start,
    end: end,
    remaining: Math.max(0, end - now)
  };
}

/* ═══════════════════════════════════════════
   ASCII Avatar Generator
   ═══════════════════════════════════════════ */
var ASCII = {};

ASCII._seed = Math.floor(Math.random()*2147483647);
ASCII._rng = function() {
  ASCII._seed = (ASCII._seed * 16807 + 0) % 2147483647;
  return (ASCII._seed - 1) / 2147483646;
};
ASCII.pick = function(arr) { return arr[Math.floor(ASCII._rng() * arr.length)]; };

ASCII.face = function() {
  var eyes = ASCII.pick(['● ●','o o','• •','O O','@ @']);
  var m = ASCII.pick(['____','────','﹏﹏﹏','~~~~']);
  var r=[];
  r.push('  .---.');
  r.push(' | '+eyes+' |');
  r.push(' |  '+m+'  |');
  r.push('  \'---\'');
  return r.join('\n');
};
ASCII.diamond = function() {
  var c='◆'; var f='·'; var n=4, r=[];
  for(var i=0;i<n;i++){ var s=' '.repeat(n-i-1); r.push(i===0?s+c:s+c+f.repeat(i*2-1)+c); }
  for(var i=n-2;i>=0;i--){ var s=' '.repeat(n-i-1); r.push(i===0?s+c:s+c+f.repeat(i*2-1)+c); }
  return r.join('\n');
};
ASCII.wave = function() {
  var r=[], w=13;
  for(var y=0;y<7;y++){
    var l='';
    for(var x=0;x<w;x++){
      var v=Math.sin(x/3+y/1.5)*Math.cos(y/2+x/4);
      l+=v>0.3?'~':v<-0.3?'≈':Math.abs(v)<.15?'·':' ';
    }
    r.push(l);
  }
  return r.join('\n');
};
ASCII.constellation = function() {
  var stars=['✦','✧','·','•','⋆']; var r=[], w=14, h=9;
  var grid=[]; for(var y=0;y<h;y++){ grid[y]=[]; for(var x=0;x<w;x++) grid[y][x]=' '; }
  for(var i=0;i<8;i++){ grid[Math.floor(ASCII._rng()*h)][Math.floor(ASCII._rng()*w)]=ASCII.pick(stars); }
  for(var y=0;y<h;y++) r.push(grid[y].join(''));
  return r.join('\n');
};
ASCII.circuit = function() {
  var w=13, h=8, g=[];
  for(var y=0;y<h;y++){ g[y]=[]; for(var x=0;x<w;x++) g[y][x]=' '; }
  for(var y=1;y<h;y+=2) for(var x=0;x<w;x++) if(ASCII._rng()>.3) g[y][x]='─';
  for(var x=1;x<w;x+=3) for(var y=0;y<h;y++){ if(g[y][x]==='─') g[y][x]='┼'; else if(ASCII._rng()>.4) g[y][x]='│'; }
  for(var i=0;i<6;i++) g[Math.floor(ASCII._rng()*h)][Math.floor(ASCII._rng()*w)]=ASCII.pick(['●','○','◉','◆']);
  var l=[]; for(var y=0;y<h;y++) l.push(g[y].join('')); return l.join('\n');
};
ASCII.geo = function() { return ASCII.diamond(); };
ASCII.structure = function() { var r=[], t=['▀','▄','█','▌','▐']; for(var y=0;y<7;y++){ var l=''; for(var x=0;x<11;x++) l+=ASCII.pick(t); r.push(l); } return r.join('\n'); };
ASCII.fractal = function() {
  var r=[], w=15;
  for(var y=0;y<9;y++){
    var l='';
    for(var x=0;x<w;x++){
      var v=(x^y)/3%1;
      l+=v<.25?'▓':v<.5?'▒':v<.75?'░':' ';
    }
    r.push(l);
  }
  return r.join('\n');
};
ASCII.blueprint = function() {
  var r=[], w=13;
  for(var y=0;y<7;y++){
    var l='';
    for(var x=0;x<w;x++){
      if(y%2===0||x%3===0) l+='┼'; else l+=' ';
    }
    r.push(l);
  }
  return r.join('\n');
};

var ASCII_MAP = {
  moon: function(){ var r=['    ☽','   ☽  ','  ✦   ','   ·  ']; return r.join('\n'); },
  wave: ASCII.wave, circuit: ASCII.circuit, constellation: ASCII.constellation,
  geo: ASCII.geo, blueprint: ASCII.blueprint, diamond: ASCII.diamond,
  spiral: function(){ var r=[],n=5; for(var i=0;i<n;i++){ var s=' '.repeat(n-i-1), c='@'; r.push(s+'@'+'·'.repeat(i*2-1)+(i>0?'@':'')); } for(var i=n-2;i>=0;i--){ var s=' '.repeat(n-i-1); r.push(s+'@'+'·'.repeat(i*2-1)+(i>0?'@':'')); } return r.join('\n'); },
  face: ASCII.face, structure: ASCII.structure,
  pcb: function(){ return ASCII.circuit(); },
  starfield: ASCII.constellation,
  terminal: function(){ var r=[' > _',' > ./build',' > deploy',' > ...',' > done  ✓']; return r.join('\n'); },
  fractal: ASCII.fractal,
  symbol: function(){ var r=['  ◆ ◇ ◆',' ◇ ◆ ◇','  ◆ ◇ ◆']; return r.join('\n'); },
  waves: function(){ var r=[],w=13; for(var y=0;y<7;y++){ var l=''; for(var x=0;x<w;x++){ var v=Math.sin(x/2+y)*Math.cos(y+x/3); l+=v>0.4?'◠':v<-0.4?'◡':'~'; } r.push(l); } return r.join('\n'); }
};

/* ═══════════════════════════════════════════
   Timer Controller
   ═══════════════════════════════════════════ */
var lastSessionIdx = -1;
var currentSession = null;

function updateTimers() {
  var now = new Date();
  currentSession = getSession(now);

  // Session title
  document.getElementById('filmTitle').textContent = currentSession.name;
  document.getElementById('filmSubtitle').textContent = currentSession.sub;

  // Meta: date
  var yyyy = now.getFullYear();
  var mm = String(now.getMonth()+1).padStart(2,'0');
  var dd = String(now.getDate()).padStart(2,'0');
  document.getElementById('metaDate').textContent = yyyy+'-'+mm+'-'+dd;

  // Meta: showtime
  var sh = String(currentSession.start.getHours()).padStart(2,'0');
  var sm = String(currentSession.start.getMinutes()).padStart(2,'0');
  var eh = String(currentSession.end.getHours()).padStart(2,'0');
  var em = String(currentSession.end.getMinutes()).padStart(2,'0');
  document.getElementById('metaShowtime').textContent = sh+':'+sm+' — '+eh+':'+em;

  // Countdown
  var rem = currentSession.remaining;
  var mins = Math.floor(rem / 60000);
  var secs = Math.floor((rem % 60000) / 1000);
  var cdEl = document.getElementById('countdown');
  cdEl.textContent = String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  cdEl.classList.toggle('urgent', rem < 60000);

  // Daily progress
  var midnight = new Date(now); midnight.setHours(0,0,0,0);
  var dayPct = ((now - midnight) / 86400000) * 100;
  document.getElementById('todayFill').style.width = dayPct.toFixed(1)+'%';
  document.getElementById('todayPct').textContent = dayPct.toFixed(1)+'%';

  // Yearly progress
  var yearStart = new Date(now.getFullYear(), 0, 1);
  var yearEnd = new Date(now.getFullYear()+1, 0, 1);
  var yearPct = ((now - yearStart) / (yearEnd - yearStart)) * 100;
  document.getElementById('yearFill').style.width = yearPct.toFixed(1)+'%';
  document.getElementById('yearPct').textContent = yearPct.toFixed(1)+'%';

  // Session change detection
  if (lastSessionIdx !== -1 && lastSessionIdx !== currentSession.index) {
    triggerTear();
  }
  lastSessionIdx = currentSession.index;
}

/* ═══════════════════════════════════════════
   Tear Animation
   ═══════════════════════════════════════════ */
function triggerTear() {
  var ticket = document.getElementById('ticket');
  // Regenerate seed for new session
  ASCII._seed = Math.floor(Math.random()*2147483647);

  ticket.classList.add('tearing');
  setTimeout(function() {
    updateAvatar();
    updateTimers();
    ticket.classList.remove('tearing');
    ticket.classList.add('fresh');
    setTimeout(function() { ticket.classList.remove('fresh'); }, 500);
  }, 450);
}

function updateAvatar() {
  if (!currentSession) return;
  var gen = ASCII_MAP[currentSession.ascii] || ASCII.face;
  document.getElementById('avatar').textContent = gen();
}

/* ═══════════════════════════════════════════
   Ticket Export (Canvas → PNG)
   ═══════════════════════════════════════════ */
document.getElementById('saveBtn').addEventListener('click', function() {
  var ticket = document.getElementById('ticket');
  var toast = document.getElementById('toast');

  // Use html2canvas approach: create SVG foreignObject
  var rect = ticket.getBoundingClientRect();
  var scale = 2;
  var w = rect.width * scale;
  var h = rect.height * scale;

  var canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  var ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Build SVG with foreignObject
  var styles = Array.from(document.querySelectorAll('style')).map(function(s){return s.textContent;}).join('\n');
  var html = ticket.outerHTML;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+rect.width+'" height="'+rect.height+'">'+
    '<foreignObject width="100%" height="100%">'+
    '<div xmlns="http://www.w3.org/1999/xhtml">'+
    '<style>'+styles+'</style>'+html+
    '</div></foreignObject></svg>';

  var img = new Image();
  var blob = new Blob([svg], {type:'image/svg+xml;charset=utf-8'});
  var url = URL.createObjectURL(blob);

  img.onload = function() {
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ticket-'+currentSession.name.replace(/\s/g,'-')+'.png';
      a.click();
      toast.textContent = t('saved');
      toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, 2000);
    }, 'image/png');
  };

  img.src = url;
});

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */
applyI18n();
updateTimers();
updateAvatar();

// Tick every second
setInterval(function() {
  updateTimers();
}, 1000);

})();
