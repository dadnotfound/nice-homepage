<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nice</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-start: #e8e9ed;
    --bg-end: #d1d4db;
    --card-bg: rgba(255, 255, 255, 0.55);
    --card-border: rgba(255, 255, 255, 0.6);
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #999;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --divider: rgba(0, 0, 0, 0.08);
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
    --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);
    --shadow-card-hover: 0 12px 48px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.06);
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #e8e9ed 0%, #d7d9df 30%, #e2e3e8 60%, #d1d4db 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .card {
    position: relative;
    background: var(--card-bg);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 56px 48px 44px;
    max-width: 400px;
    width: calc(100% - 40px);
    box-shadow: var(--shadow-card);
    text-align: center;
    transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1),
                box-shadow 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  }

  .card:hover {
    transform: translateY(-2px) scale(1.01);
    box-shadow: var(--shadow-card-hover);
  }

  .avatar {
    font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
    font-size: 9px;
    line-height: 1.15;
    color: var(--text-primary);
    white-space: pre;
    display: inline-block;
    margin-bottom: 28px;
    user-select: none;
    opacity: 0.85;
    transition: opacity 0.3s ease;
  }

  .card:hover .avatar {
    opacity: 1;
  }

  .name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .tagline {
    font-size: 15px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: -0.1px;
  }

  .divider {
    width: 28px;
    height: 1px;
    background: var(--divider);
    margin: 24px auto;
    border-radius: 1px;
  }

  .links {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .links a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 450;
    letter-spacing: -0.1px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: color 0.2s ease, background 0.2s ease;
  }

  .links a:hover {
    color: var(--accent-hover);
    background: rgba(0, 113, 227, 0.06);
  }

  .links svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  footer {
    margin-top: 36px;
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.2px;
  }

  @media (max-width: 480px) {
    .card {
      padding: 40px 28px 32px;
      border-radius: 20px;
    }
    .avatar {
      font-size: 7px;
      margin-bottom: 22px;
    }
    .name {
      font-size: 26px;
    }
    .tagline {
      font-size: 14px;
    }
    .links {
      gap: 8px;
    }
    .links a {
      font-size: 13px;
      padding: 5px 10px;
    }
  }
</style>
</head>
<body>

<div class="card">
  <div class="avatar" id="avatar"></div>
  <div class="name">nice</div>
  <div class="tagline">Builder &amp; Thinker</div>
  <div class="divider"></div>
  <div class="links">
    <a href="https://x.com/Myrfather" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      X
    </a>
    <a href="https://github.com/dadnotfound" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>

      Docs

  </div>
  <footer>&copy; 2026 nice</footer>
</div>

<script>
(function() {
  // в”Җв”Җ ASCII art generators в”Җв”Җ
  function rng(seed) {
    var s = seed;
    return function() {
      s = (s * 16807 + 0) % 2147483647;
      return (s - 1) / 2147483646;
    };
  }

  var seed = Math.floor(Math.random() * 2147483647);
  var rand = rng(seed);

  function pick(arr) {
    return arr[Math.floor(rand() * arr.length)];
  }

  function generate() {
    var choice = Math.floor(rand() * 5);
    switch (choice) {
      case 0: return face();
      case 1: return diamond();
      case 2: return circuit();
      case 3: return constellation();
      case 4: return waves();
      default: return face();
    }
  }

  function face() {
    var eyes = pick(['в—Ҹ в—Ҹ', 'o o', 'вҖў вҖў', 'O O', '@ @']);
    var mouths = pick(['____', 'в”Җв”Җв”Җв”Җ', 'п№Ҹп№Ҹп№Ҹ', '~~~~']);
    var ears = pick([['(  ', '  )'], ['|  ', '  |'], ['', '']]);
    var hair = pick([
      ['в•ӯв”Җв”Җв”Җв”Җв”Җв”Җв•®','в•°в”Җв”Җв”Җв”Җв”Җв”Җв•Ҝ'],
      ['в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ','в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ'],
      ['в•”в•җв•җв•җв•җв•җв•җв•—','в•ҡв•җв•җв•җв•җв•җв•җв•қ'],
      [' .в”Җв”Җв”Җв”Җв”Җ.','в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ'],
      ['','']
    ]);
    var lines = [];
    if (hair[0]) lines.push('    ' + hair[0]);
    lines.push('  ' + ears[0] + ' .---. ' + ears[1]);
    lines.push('  ' + ears[0] + ' |   | ' + ears[1]);
    lines.push('  ' + ears[0] + " | " + eyes + " | " + ears[1]);
    lines.push('  ' + ears[0] + " |  " + mouths + "  | " + ears[1]);
    lines.push('  ' + ears[0] + " '---' " + ears[1]);
    if (hair[1]) lines.push('    ' + hair[1]);
    return lines.join('\n');
  }

  function diamond() {
    var chars = pick(['вңҰ','в—Ҷ','в—Ү','вҷҰ','в¬Ҙ','вҳ…']);
    var fill = pick(['В·',':','.',' ',' ']);
    var lines = [];
    var n = 5;
    for (var i = 0; i < n; i++) {
      var sp = ' '.repeat(n - i - 1);
      if (i === 0) {
        lines.push(sp + chars);
      } else {
        lines.push(sp + chars + fill.repeat(i * 2 - 1) + chars);
      }
    }
    for (var i = n - 2; i >= 0; i--) {
      var sp = ' '.repeat(n - i - 1);
      if (i === 0) {
        lines.push(sp + chars);
      } else {
        lines.push(sp + chars + fill.repeat(i * 2 - 1) + chars);
      }
    }
    return lines.join('\n');
  }

  function circuit() {
    var lines = [];
    var w = 13;
    var h = 9;
    var grid = [];
    for (var y = 0; y < h; y++) {
      grid[y] = [];
      for (var x = 0; x < w; x++) {
        grid[y][x] = ' ';
      }
    }
    // Horizontal traces
    for (var y = 1; y < h; y += 2) {
      for (var x = 0; x < w; x++) {
        if (rand() > 0.3) grid[y][x] = 'в”Җ';
      }
    }
    // Vertical traces
    for (var x = 1; x < w; x += 3) {
      for (var y = 0; y < h; y++) {
        if (grid[y][x] === 'в”Җ') grid[y][x] = 'в”ј';
        else if (rand() > 0.4) grid[y][x] = 'в”Ӯ';
      }
    }
    // Nodes
    for (var i = 0; i < 8; i++) {
      var nx = Math.floor(rand() * w);
      var ny = Math.floor(rand() * h);
      grid[ny][nx] = pick(['в—Ҹ','в—Ӣ','в—ү','в—Ҷ','в–Ә']);
    }
    // Corners
    for (var y = 0; y < h; y++) {
      for (var x = 0; x < w; x++) {
        if (grid[y][x] === 'в”Җ') {
          var up = y > 0 && grid[y-1][x] === 'в”Ӯ';
          var down = y < h-1 && grid[y+1][x] === 'в”Ӯ';
          if (up && down) grid[y][x] = 'в”ј';
          else if (up) grid[y][x] = 'в”ҙ';
          else if (down) grid[y][x] = 'в”¬';
        }
      }
    }
    for (var y = 0; y < h; y++) {
      lines.push(grid[y].join(''));
    }
    return lines.join('\n');
  }

  function constellation() {
    var lines = [];
    var w = 16;
    var h = 11;
    var grid = [];
    for (var y = 0; y < h; y++) {
      grid[y] = [];
      for (var x = 0; x < w; x++) {
        grid[y][x] = ' ';
      }
    }
    var stars = ['вңҰ','вң§','В·','вҖў','вӢҶ','вҒ•','вң¶'];
    var points = [];
    for (var i = 0; i < 10; i++) {
      var px = Math.floor(rand() * w);
      var py = Math.floor(rand() * h);
      grid[py][px] = pick(stars);
      points.push([px, py]);
    }
    // Draw lines between nearby points
    for (var i = 0; i < points.length; i++) {
      for (var j = i + 1; j < points.length; j++) {
        var dx = points[i][0] - points[j][0];
        var dy = points[i][1] - points[j][1];
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 5 && rand() > 0.4) {
          var x0 = points[i][0], y0 = points[i][1];
          var x1 = points[j][0], y1 = points[j][1];
          var steps = Math.max(Math.abs(x1 - x0), Math.abs(y1 - y0));
          for (var s = 1; s < steps; s++) {
            var t = s / steps;
            var cx = Math.round(x0 + dx * t);
            var cy = Math.round(y0 + dy * t);
            if (grid[cy][cx] === ' ') {
              grid[cy][cx] = pick(['В·','В·','В·',' ','В·',' ']);
            }
          }
        }
      }
    }
    for (var y = 0; y < h; y++) {
      lines.push(grid[y].join(''));
    }
    return lines.join('\n');
  }

  function waves() {
    var lines = [];
    var w = 17;
    var chars = pick([['~','вүҲ','вҲҝ'], ['в— ','в—Ў','~'], ['вҢ’','вҢЈ','вҖҗ']]);
    for (var y = 0; y < 9; y++) {
      var line = '';
      for (var x = 0; x < w; x++) {
        var v = Math.sin((x / 3) + (y / 1.5)) * Math.cos((y / 2) + (x / 4));
        if (v > 0.3) line += chars[0];
        else if (v < -0.3) line += chars[1];
        else if (Math.abs(v) < 0.15 && rand() > 0.7) line += chars[2];
        else line += ' ';
      }
      lines.push(line);
    }
    return lines.join('\n');
  }

  document.getElementById('avatar').textContent = generate();
})();
</script>

</body>
</html>
