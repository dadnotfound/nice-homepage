<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思考 - nice</title>
  <meta name="description" content="奈思的思考记录，关于编程、生活和设计的深度思考">
  <meta name="keywords" content="思考,编程,设计,哲学,创新">
  <meta name="author" content="奈思">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <!-- 模块化CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/thoughts.css">
</head>
<body>

  <!-- 思考页面容器 -->
  <div class="thoughts-container" id="thoughtsContainer">

    <!-- 页面头部 -->
    <header class="thoughts-header">
      <h1 class="thoughts-title" id="thoughtsTitle">思考</h1>
      <a href="#" class="back-btn" id="backBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        返回主页
      </a>
    </header>

    <!-- 标签过滤器 -->
    <section class="filter-section">
      <span class="filter-label">筛选:</span>
      <div class="filter-tags" id="filterTags">
        <div class="tag-filter active" data-tag="all">全部</div>
        <div class="tag-filter" data-tag="philosophy">哲学</div>
        <div class="tag-filter" data-tag="tech">技术</div>
        <div class="tag-filter" data-tag="life">生活</div>
        <div class="tag-filter" data-tag="design">设计</div>
        <div class="tag-filter" data-tag="innovation">创新</div>
      </div>
    </section>

    <!-- 思考内容区域 -->
    <main class="thoughts-grid" id="thoughtsGrid">
      <!-- 动态加载思考卡片 -->
    </main>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📝</div>
      <h2 class="empty-title">暂无思考记录</h2>
      <p class="empty-description">回来查看更多关于编程、设计和生活的深度思考</p>
    </div>
  </div>

  <!-- 思考详情模态 -->
  <div class="thought-modal" id="thoughtModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-content-text" id="modalContent"></div>
        <div class="modal-tags" id="modalTags"></div>
      </div>
      <div class="modal-footer">
        <div class="modal-tags" id="modalFooterTags"></div>
      </div>
    </div>
  </div>

  <!-- 模块化JavaScript -->
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ticket.js"></script>
  <script src="js/navigator.js"></script>

  <!-- 思考页面逻辑 -->
  <script>
    // 思考数据
    const thoughtsData = [
      {
        id: '001',
        date: '2025-05-18',
        title: '编程即艺术',
        content: `编程不仅仅是技术实现，更是一种创造性表达。就像画家用颜料在画布上创作，程序员用代码在数字世界里构建。每一行代码都承载着创作者的意图，每一个算法都体现着对美的追求。

优秀的代码如同艺术品般优雅。它不仅要实现功能，还要追求简洁、清晰和可读性。正如建筑师设计的建筑既要坚固实用，又要美观和谐，程序员编写的代码也要高效可靠，还要令人赏心悦目。

在代码的世界里，我们可以找到纯粹的美学价值。精心设计的算法、优雅的数据结构、巧妙的模式应用，都展现了人类智慧的结晶。这就是编程的艺术性——在理性的框架内，追求极致的优雅。

当我们将编程视为艺术，就不再满足于简单的功能实现。我们开始思考如何让代码更有表现力，如何让算法更具诗意，如何让设计更具美感。这种追求使得编程超越了工具性，成为了一种真正的创作活动。

最终，好的编程作品就像好的艺术品一样，能够触动人心，启发思考，甚至改变世界。这就是编程作为艺术的真正魅力所在。`,
        tags: ['philosophy', 'design'],
        lang: 'zh'
      },
      {
        id: '002',
        date: '2025-05-15',
        title: '时间的数学之美',
        content: `我们总是将时间视为线性流动，但时间的本质远比这复杂。在编程的世界里，时间可以被精确到纳秒；在哲学的思考中，时间被质疑是否真实存在。这种矛盾恰恰体现了时间的奇妙性质。

时间的度量让我们能够掌握生活的节奏。90分钟的编程会话就像一场精彩的电影，有开始、发展和高潮。这种时间分割不仅提高了效率，还创造了一种仪式感。

当我们将时间量化，就能更好地理解生活的本质。每天16个编程会话，每个都是对时间的精心雕琢。这种分形结构让人想起曼德博集合——在看似随机的模式中，隐藏着惊人的规律。

时间的数学还体现在进度条的设计上。今天的进度是6.25%，今年的进度是38.5%。这些数字不仅是功能的体现，更是一种可视化的艺术。它们让我们能够直观地感受到时间的流逝和生命的进程。

然而，真正的智慧在于理解时间的相对性。一个专注的下午可以飞逝，而一个漫长的会议却感觉漫长无比。这就是为什么编程的艺术不仅在于掌握技术，更在于掌握时间的艺术。

让我们用代码去思考时间，用时间去创造美。这或许就是程序员最独特的生活哲学。`,
        tags: ['tech', 'philosophy'],
        lang: 'zh'
      },
      {
        id: '003',
        date: '2025-05-10',
        title: '极简主义的实践',
        content: `在信息爆炸的时代，极简主义不仅是一种美学选择，更是一种生存智慧。写代码时，我们追求用最少的行数实现最多的功能；设计界面时，我们追求用最简洁的方式传递最清晰的信息。

极简主义的核心在于消除冗余。就像好的文学作品不需要华丽的辞藻堆砌，好的代码也不需要复杂的逻辑嵌套。真正的简洁来自于对本质的深刻理解——只有完全理解问题，才能找到最直接的解决方案。

在架构设计上，极简主义表现为模块化和单一职责。每个模块只做一件事，但要做得极致。这种哲学让系统变得可维护、可扩展，也更容易被理解和修改。

极简主义也体现在用户体验上。最好的用户界面是用户几乎感觉不到它的存在。就像呼吸一样自然，不需要思考如何使用。这种"隐形设计"需要设计师投入更多的思考，最终呈现出看似简单的结果。

生活中的极简主义同样重要。减少不必要的干扰，专注于真正重要的事情，这样才能在复杂的世界中保持内心的平静和创造力。

或许，极简主义的最终目的不是为了减法，而是为了让我们能够更专注于真正有价值的事情。在编程和生活中，这都是永恒的真理。`,
        tags: ['design', 'life'],
        lang: 'zh'
      },
      {
        id: '004',
        date: '2025-05-05',
        title: '创新的本质',
        content: `创新往往被视为颠覆性的突破，但真正的创新往往源于对现有技术的深刻理解。就像伟大的艺术作品都是在传统的基础上发展而来，技术的进步也往往是渐进式的改进。

创新需要勇气，更需要智慧。勇气在于敢于质疑既定的规则，智慧在于能够找到更好的替代方案。好的创新不是为了创新而创新，而是为了解决真正的问题。

在编程领域，创新体现在对问题的重新定义。有时候，最创新的方法不是创建新的解决方案，而是重新组织现有的解决方案。就像乐高积木，通过不同的组合方式，可以创造出无数的可能性。

创新也需要失败的勇气。很多伟大的创新都是在无数次失败后才诞生的。正是因为不怕犯错，我们才能不断突破界限。

真正的创新者都是持续学习的典范。他们不仅关注前沿技术，更关注基础理论。正是这种深度的学习，让他们能够在关键时刻做出突破性的创新。

让我们拥抱创新，但也不要忘记，最好的创新往往来自于对本质的深刻理解。在技术的世界里，这永远是永恒的真理。`,
        tags: ['innovation', 'tech'],
        lang: 'zh'
      },
      {
        id: '005',
        date: '2025-04-28',
        title: '代码的生命力',
        content: `好的代码是有生命的。它不仅仅是一堆静态的指令，更是一个不断进化的有机体。随着时间的推移，代码会不断适应新的环境，吸收新的思想，变得更加成熟和强大。

代码的生命力来自于持续的维护和迭代。就像植物需要阳光和水才能生长，代码需要被使用、被修改、被优化才能保持活力。这种生命力让代码能够穿越时间的考验，保持其价值。

在团队合作中，代码的生命力体现为知识的传承。每个开发者都在代码中留下了自己的思考，这些思考汇聚在一起，形成了一种集体智慧。这种智慧超越了个体，成为了项目的灵魂。

代码的生命力还体现在其适应性上。好的代码能够应对变化的需求，就像生物能够适应环境的变化一样。这种适应性来自于模块化设计和清晰的结构。

最终，最好的代码就像最好的文学作品一样，能够经得起时间的考验。它们不仅在技术上保持先进，在思想上也能启发后人。这就是代码作为生命体的真正价值所在。

让我们用心对待每一行代码，让它们拥有真正的生命力。`,
        tags: ['tech', 'philosophy'],
        lang: 'zh'
      },
      {
        id: '006',
        date: '2025-04-20',
        title: '平衡的艺术',
        content: `在编程的世界里，平衡无处不在。性能与可读性的平衡，创新与稳定的平衡，短期目标与长期愿景的平衡。找到这些平衡点，是每个程序员必须面对的挑战。

平衡不是妥协，而是一种智慧。就像走钢丝表演者，在保持前进的同时维持身体的稳定。好的程序员也是如此，在不断变化的需求中找到最佳的解决方案。

技术栈的选择也需要平衡。最新的技术带来了便利，但稳定的技术保证了可靠性。选择合适的技术组合，就像调配一杯完美的鸡尾酒，需要经验的积累和直觉的判断。

在个人生活中，平衡同样重要。工作与生活的平衡，学习与休息的平衡，独处与社交的平衡。这些平衡点因人而异，但找到它们都是获得幸福的关键。

平衡的艺术还在于适度的原则。就像盐在烹饪中的作用，太少则淡，太多则咸。最佳的状态往往在中间。这种对适度的把握，是高手的标志。

真正的平衡来自于对整体的深刻理解。只有看到全局，才能找到各个部分之间的最佳关系。这就是平衡的精髓所在。`,
        tags: ['life', 'design'],
        lang: 'zh'
      }
    ];

    // 思考页面管理器
    class ThoughtsPage {
      constructor() {
        this.container = document.getElementById('thoughtsContainer');
        this.modal = document.getElementById('thoughtModal');
        this.currentFilter = 'all';
        this.init();
      }

      init() {
        // 初始化i18n
        i18n.updateUI();
        this.updateI18n();
        this.setupEventListeners();
        this.renderThoughts();
      }

      // 设置事件监听器
      setupEventListeners() {
        // 标签过滤器
        document.getElementById('filterTags').addEventListener('click', (e) => {
          if (e.target.classList.contains('tag-filter')) {
            document.querySelectorAll('.tag-filter').forEach(tag => {
              tag.classList.remove('active');
            });
            e.target.classList.add('active');
            this.currentFilter = e.target.dataset.tag;
            this.renderThoughts();
          }
        });

        // 模态框关闭
        document.getElementById('modalClose').addEventListener('click', () => {
          this.closeModal();
        });

        // 点击模态框外部关闭
        this.modal.addEventListener('click', (e) => {
          if (e.target === this.modal) {
            this.closeModal();
          }
        });

        // ESC键关闭模态框
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            this.closeModal();
          }
        });

        // 语言切换
        document.addEventListener('i18n:changed', () => {
          this.updateI18n();
          this.renderThoughts();
        });
      }

      // 更新国际化内容
      updateI18n() {
        document.getElementById('thoughtsTitle').textContent = i18n.t('thoughts.title');
        document.getElementById('backBtn').innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
          ${i18n.t('thoughts.back')}
        `;

        // 更新标签
        const tagTexts = i18n.t('thoughts.tags');
        const tagMap = {
          'all': '全部',
          'philosophy': tagTexts[0],
          'tech': tagTexts[1],
          'life': tagTexts[2],
          'design': tagTexts[3],
          'innovation': tagTexts[4]
        };

        document.querySelectorAll('.tag-filter').forEach(tag => {
          const tagKey = tag.dataset.tag;
          tag.textContent = tagMap[tagKey] || tagKey;
        });
      }

      // 渲染思考卡片
      renderThoughts() {
        const thoughtsGrid = document.getElementById('thoughtsGrid');
        const emptyState = document.getElementById('emptyState');

        // 过滤思考
        const filteredThoughts = this.currentFilter === 'all'
          ? thoughtsData
          : thoughtsData.filter(thought => thought.tags.includes(this.currentFilter));

        // 清空内容
        thoughtsGrid.innerHTML = '';

        if (filteredThoughts.length === 0) {
          emptyState.style.display = 'block';
          return;
        }

        emptyState.style.display = 'none';

        // 按日期倒序排列
        filteredThoughts.sort((a, b) => new Date(b.date) - new Date(a.date));

        // 渲染卡片
        filteredThoughts.forEach((thought, index) => {
          const card = this.createThoughtCard(thought);
          card.style.animationDelay = `${index * 0.1}s`;
          thoughtsGrid.appendChild(card);
        });
      }

      // 创建思考卡片
      createThoughtCard(thought) {
        const card = document.createElement('div');
        card.className = 'thought-card';
        card.dataset.tags = JSON.stringify(thought.tags);

        const formattedDate = i18n.formatDate(thought.date, 'YYYY年MM月DD日');
        const tagNames = thought.tags.map(tag => i18n.t(`thoughts.${tag}`)).join(' ');

        card.innerHTML = `
          <div class="thought-date">${formattedDate}</div>
          <h3 class="thought-title">${thought.title}</h3>
          <p class="thought-content">${this.truncateText(thought.content, 100)}</p>
          <div class="thought-tags">
            ${thought.tags.map(tag => `
              <span class="thought-tag">${i18n.t(`thoughts.${tag}`)}</span>
            `).join('')}
          </div>
        `;

        // 点击打开详情
        card.addEventListener('click', () => {
          this.showThoughtDetail(thought);
        });

        return card;
      }

      // 截断文本
      truncateText(text, maxLength) {
        if (text.length <= maxLength) return text;
        return text.substring(0, maxLength) + '...';
      }

      // 显示思考详情
      showThoughtDetail(thought) {
        // 停止页面滚动
        document.body.style.overflow = 'hidden';

        // 更新模态内容
        document.getElementById('modalTitle').textContent = thought.title;
        document.getElementById('modalDate').textContent = i18n.formatDate(thought.date, 'YYYY年MM月DD日');
        document.getElementById('modalContent').textContent = thought.content;

        // 更新标签
        const tagNames = thought.tags.map(tag => i18n.t(`thoughts.${tag}`));
        document.getElementById('modalTags').innerHTML = tagNames.map(tag => `
          <span class="thought-tag">${tag}</span>
        `).join('');

        // 显示模态框
        this.modal.classList.add('active');
      }

      // 关闭模态框
      closeModal() {
        // 恢复页面滚动
        document.body.style.overflow = '';

        // 隐藏模态框
        this.modal.classList.remove('active');
      }
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化思考页面
      const thoughtsPage = new ThoughtsPage();

      // 保持主页面背景
      if (window.opener || window.parent !== window) {
        thoughtsPage.container.classList.add('hidden');
      }
    });
  </script>

</body>
</html>
