<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>两页架构测试 - Nice思考日记</title>
  <meta name="description" content="测试主页和思考页之间的导航切换">
  <meta name="author" content="Nice">

  <!-- 基础样式 -->
  <link rel="stylesheet" href="css/base.css">
  <style>
    body {
      padding: 0;
      overflow: hidden;
    }

    .test-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 20%, rgba(212,168,83,0.06) 0%, transparent 70%);
    }

    .test-content {
      text-align: center;
      color: var(--text);
    }

    .test-title {
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .test-description {
      font-size: 18px;
      margin-bottom: 40px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .test-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .test-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      border-radius: 20px;
      font-weight: 600;
      transition: all var(--transition-sm);
    }

    .test-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212, 168, 83, 0.4);
    }

    .test-link svg {
      width: 20px;
      height: 20px;
    }

    .test-note {
      margin-top: 30px;
      font-size: 14px;
      color: var(--text-dim);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <div class="test-content">
      <h1 class="test-title">两页架构测试</h1>
      <p class="test-description">
        这个测试页面验证主页和思考页之间的导航切换功能。<br>
        请点击下面的链接进入各个页面测试：
      </p>
      <div class="test-links">
        <a href="index.html" class="test-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
          </svg>
          进入主页
        </a>
        <a href="thoughts.html" class="test-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
          </svg>
          进入思考页
        </a>
        <a href="test.html" class="test-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-4-4h2.5V9h3v4H14l-4 4z"/>
          </svg>
          刷新测试页
        </a>
      </div>
      <p class="test-note">
        💡 提示：在主页点击"思考"按钮，在思考页点击"返回主页"按钮，测试页面切换动画。
      </p>
    </div>
  </div>
</body>
</html>
