<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>功能测试 - nice</title>
  <style>
    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .test-section {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .test-title {
      color: var(--accent);
      font-size: 18px;
      margin-bottom: 15px;
      font-family: var(--font-ticket);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .test-item {
      margin: 10px 0;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
    }
    .test-link {
      display: inline-block;
      margin: 5px 10px 5px 0;
      padding: 8px 16px;
      background: var(--accent);
      color: var(--bg);
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s;
    }
    .test-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(212,168,83,0.3);
    }
    .status {
      color: #4CAF50;
    }
    .status.failed {
      color: #f44336;
    }
    pre {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>功能测试页面</h1>

  <div class="test-section">
    <h2 class="test-title">导航测试</h2>
    <div class="test-item">
      <strong>主页测试：</strong>
      <a href="index.html" class="test-link">进入主页</a>
    </div>
    <div class="test-item">
      <strong>思考页测试：</strong>
      <a href="thoughts.html" class="test-link">进入思考页</a>
    </div>
  </div>

  <div class="test-section">
    <h2 class="test-title">功能验证</h2>
    <div class="test-item">
      <strong>国际化：</strong> <span id="i18n-status" class="status">测试中...</span>
    </div>
    <div class="test-item">
      <strong>导航系统：</strong> <span id="nav-status" class="status">测试中...</span>
    </div>
    <div class="test-item">
      <strong>工具函数：</strong> <span id="utils-status" class="status">测试中...</span>
    </div>
  </div>

  <div class="test-section">
    <h2 class="test-title">JavaScript模块测试</h2>
    <pre id="test-output"></pre>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ticket.js"></script>
  <script src="js/navigator.js"></script>

  <script>
    // 测试输出
    const testOutput = document.getElementById('test-output');
    const testResult = (module, success) => {
      const status = success ? '✓ 通过' : '✗ 失败';
      testOutput.innerHTML += `${module}: ${status}\n`;
    };

    // 开始测试
    testOutput.textContent = '开始运行功能测试...\n\n';

    // 测试i18n
    try {
      if (window.i18n && window.i18n.t) {
        const zhText = window.i18n.t('cinema');
        const enText = window.i18n.toggleLang();
        window.i18n.toggleLang(); // 切换回中文
        testResult('i18n模块', zhText && enText && zhText !== enText);
        document.getElementById('i18n-status').textContent = '正常 ✓';
      } else {
        throw new Error('i18n模块未加载');
      }
    } catch (e) {
      testResult('i18n模块', false);
      document.getElementById('i18n-status').textContent = '失败 ✗';
      document.getElementById('i18n-status').className = 'status failed';
    }

    // 测试navigator
    try {
      if (window.Navigator && window.navigatorInstance) {
        const navigator = window.navigatorInstance;
        testResult('navigator模块', navigator && navigator.getCurrentPage);
        document.getElementById('nav-status').textContent = '正常 ✓';
      } else {
        throw new Error('navigator模块未加载');
      }
    } catch (e) {
      testResult('navigator模块', false);
      document.getElementById('nav-status').textContent = '失败 ✗';
      document.getElementById('nav-status').className = 'status failed';
    }

    // 测试utils
    try {
      if (window.utils && window.utils.random && window.utils.debounce) {
        const randomNum = window.utils.random(1, 10);
        const debounceTest = window.utils.debounce(() => {}, 100);
        testResult('utils模块', randomNum && debounceTest);
        document.getElementById('utils-status').textContent = '正常 ✓';
      } else {
        throw new Error('utils模块未加载');
      }
    } catch (e) {
      testResult('utils模块', false);
      document.getElementById('utils-status').textContent = '失败 ✗';
      document.getElementById('utils-status').className = 'status failed';
    }

    // 测试ticket
    try {
      if (window.ticket && window.ticket.ASC && window.ticket.SessionManager) {
        testResult('ticket模块', true);
      } else {
        throw new Error('ticket模块未加载');
      }
    } catch (e) {
      testResult('ticket模块', false);
    }

    testOutput.textContent += '\n测试完成！';
  </script>
</body>
</html>
