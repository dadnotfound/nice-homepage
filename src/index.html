<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nice — 时间即存在</title>
  <meta name="description" content="一个表达「时间即存在」哲学的个人主页">
  <meta name="keywords" content="个人主页,哲学,时间,极简设计">
  <meta name="author" content="奈思">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <!-- 模块化CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/zen.css">
</head>
<body>

  <!-- 背景流动网格 -->
  <div class="flow-bg"></div>

  <!-- 悬浮 UI：语言切换 -->
  <button class="lang-toggle" id="langToggle">EN</button>

  <!-- 主容器 -->
  <div class="container">
    <!-- 名字：112px 大锚点 -->
    <div class="name">奈思</div>

    <!-- 元数据网格：理性分栏 -->
    <div class="header">
      <div class="meta-grid">
        <div class="meta-item">
          <span class="meta-label" id="labelSession">Session</span>
          <span class="meta-value" id="sessionValue">04/16</span>
        </div>
        <div class="meta-item">
          <span class="meta-label" id="labelYear">Year Day</span>
          <span class="meta-value" id="yearValue">138/365</span>
        </div>
      </div>
    </div>

    <!-- 时间区块：核心焦点 -->
    <div class="time-section">
      <div class="session-info">
        <div class="session" id="sessionName">深度阅读</div>
        <div class="session-subtitle">
          <span class="session-number" id="sessionNumber">SESSION 04</span>
          <span id="sessionSubtitle">· 当下存在</span>
        </div>
      </div>
      <div class="progress">
        <div class="countdown" id="countdown">⏱ 47:23 left</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <!-- 社交链接 -->
    <div class="social-row">
      <a href="https://x.com/Myrfather" target="_blank" rel="noopener" class="social-link">
        X
      </a>
      <a href="https://github.com/dadnotfound" target="_blank" rel="noopener" class="social-link">
        GitHub
      </a>
    </div>
  </div>

  <!-- 模块化JavaScript -->
  <script src="js/utils.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ticket.js"></script>
  <script src="js/navigator.js"></script>

  <!-- 应用初始化 -->
  <script>
    // 页面初始化
    document.addEventListener('DOMContentLoaded', function() {
      // 初始化票据功能（改为时间管理）
      ticket.init();

      // 初始化导航系统（自动处理按钮事件）
      const navigator = window.navigatorInstance;
    });
  </script>

</body>
</html>
